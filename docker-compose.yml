services:
  # Base de Datos MySQL
  db_ecommerce:
    image: mysql:8.0
    container_name: ecommerce-perfumes-db
    restart: always
    environment:
      MYSQL_DATABASE: ecommercemrcode
      MYSQL_ROOT_PASSWORD: root_password # Cambiar por algo más seguro si es necesario
    ports:
      - "3309:3306" # Mapeo de puerto externo 3309 a interno 3306 para evitar conflictos
    volumes:
      - mysql_data:/var/lib/mysql

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # Backend (Node.js)
  backend:
    build: ./backend
    container_name: ecommerce-perfumes-api
    restart: always
    ports:
      - "3002:3000" # Mapeo de puerto externo 3002 a interno 3000
    env_file:
      - ./backend/.env
    environment:
      - PORT=3000
      - DB_HOST=db_ecommerce
      - DB_USER=root
      - DB_PASSWORD=root_password
      - DB_NAME=ecommercemrcode
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FRONTEND_URL=http://localhost:5176
      - NODE_OPTIONS=--max-old-space-size=2048
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M
    volumes:
      - ./backend:/app
      - /app/node_modules # Evita sobreescribir node_modules del contenedor
    depends_on:
      - db_ecommerce
      - redis

  # Frontend (React + Vite)
  frontend:
    build: ./frontend
    container_name: ecommerce-perfumes-web
    restart: always
    ports:
      - "5176:5173" # Mapeo de puerto externo 5176 a interno 5173
    env_file:
      - ./backend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules # Evita sobreescribir node_modules del contenedor
    environment:
      - VITE_API_URL=http://localhost:3002/api # URL para que el navegador llame al backend
      - VITE_MP_PUBLIC_KEY=${MERCADOPAGO_PUBLIC_KEY}
      - NODE_OPTIONS=--max-old-space-size=2048
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
